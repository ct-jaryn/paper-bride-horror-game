name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate story data
        run: node tools/validate_stories.mjs

      - name: Validate scene titles
        run: node tools/validate_scene_titles.mjs

      - name: Test ending reachability
        run: node tools/test_all_endings_reachability.mjs
