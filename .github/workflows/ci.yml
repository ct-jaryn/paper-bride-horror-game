name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install browser smoke test dependency
        run: npm install -g jsdom

      - name: Validate story data
        run: node tools/validate_stories.mjs

      - name: Validate scene titles
        run: node tools/validate_scene_titles.mjs

      - name: Test ending reachability
        run: node tools/test_all_endings_reachability.mjs

      - name: Test scene factory
        run: node tools/test_scene_factory.mjs

      - name: Test effect engine
        run: node tools/test_effect_engine.mjs

      - name: Test ending factory
        run: node tools/test_ending_factory.mjs

      - name: Test renderer
        run: node tools/test_renderer.mjs

      - name: Test save manager
        run: node tools/test_save_manager.mjs

      - name: Browser DOM smoke test
        run: NODE_PATH=$(npm root -g) node tools/test_browser_boot.cjs

      - name: Validate choice conditions
        run: node tools/validate_choice_conditions.mjs

      - name: Detect duplicate scene definitions
        run: node tools/detect_duplicate_scenes.mjs

      - name: Detect dead scenes
        continue-on-error: true
        run: node tools/detect_dead_scenes.mjs

      - name: Validate item/flag usage
        continue-on-error: true
        run: node tools/validate_item_flag_usage.mjs
